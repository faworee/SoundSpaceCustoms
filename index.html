<script>
  const favCookie = document.cookie
    .split('; ')
    .find(row => row.startsWith('soundSpaceFavorites='));
  
  const favValue = favCookie ? favCookie.split('=').slice(1).join('=') : '';
  
  window.location.replace(
    'https://faworee.com/soundspacecustoms/?favorites=' + encodeURIComponent(favValue)
  );
</script>
